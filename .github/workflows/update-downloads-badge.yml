name: Update downloads badge

on:
  schedule:
    - cron: "23 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Update cumulative clone downloads badge
        env:
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ github.token }}
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          if [ -z "$TRAFFIC_TOKEN" ]; then
            echo "::error::TRAFFIC_TOKEN secret is required"
            exit 1
          fi

          python3 <<'PY'
          import base64
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          API = "https://api.github.com"
          REPO = os.environ["REPOSITORY"]
          BRANCH = os.environ.get("BRANCH") or "main"
          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          TRAFFIC_TOKEN = os.environ["TRAFFIC_TOKEN"]

          def api(method, path, token, payload=None):
            url = path if path.startswith("https://") else f"{API}{path}"
            data = None if payload is None else json.dumps(payload).encode("utf-8")
            headers = {
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "flmgm-downloads-badge",
            }
            if data is not None:
              headers["Content-Type"] = "application/json"
            if token:
              headers["Authorization"] = f"Bearer {token}"
            req = urllib.request.Request(url, data=data, headers=headers, method=method)
            try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                raw = resp.read()
            except urllib.error.HTTPError as err:
              body = err.read().decode("utf-8", "replace")
              print(f"GitHub API error {err.code} for {method} {url}: {body}", file=sys.stderr)
              raise
            return json.loads(raw.decode("utf-8")) if raw else None

          def quote_path(path):
            return urllib.parse.quote(path, safe="/")

          def read_text(path, default=""):
            try:
              item = api(
                "GET",
                f"/repos/{REPO}/contents/{quote_path(path)}?ref={urllib.parse.quote(BRANCH, safe='/')}",
                GITHUB_TOKEN,
              )
            except urllib.error.HTTPError as err:
              if err.code == 404:
                return default
              raise
            return base64.b64decode(item.get("content", "")).decode("utf-8")

          def make_svg(count):
            label_width = 80
            value_width = len(str(count)) * 7 + 28
            width = label_width + value_width
            value_x = label_width + value_width // 2
            return "\n".join([
              f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="20" role="img" aria-label="downloads: {count}">',
              f'  <title>downloads: {count}</title>',
              f'  <clipPath id="r"><rect width="{width}" height="20" rx="3"/></clipPath>',
              '  <g clip-path="url(#r)">',
              f'    <rect width="{label_width}" height="20" fill="#555"/>',
              f'    <rect x="{label_width}" width="{value_width}" height="20" fill="#2ea44f"/>',
              '  </g>',
              '  <g fill="#fff" font-family="Verdana,Arial,sans-serif" font-size="11" text-anchor="middle">',
              '    <text x="40" y="14">downloads</text>',
              f'    <text x="{value_x}" y="14">{count}</text>',
              '  </g>',
              '</svg>',
              '',
            ])

          latest = api("GET", f"/repos/{REPO}/traffic/clones", TRAFFIC_TOKEN)
          history_text = read_text("badges/downloads-history.json", "{}")
          readme = read_text("README.md")
          old_svg = read_text("badges/downloads.svg", "")

          history = json.loads(history_text or "{}")
          daily = {str(k): int(v) for k, v in history.get("daily", {}).items()}
          for item in latest.get("clones", []):
            date = str(item.get("timestamp", ""))[:10]
            count = int(item.get("count") or 0)
            if date and count > 0:
              daily[date] = max(int(daily.get(date, 0)), count)

          total = sum(daily.values())
          new_history = json.dumps({
            "note": "Cumulative GitHub clone downloads tracked by this repository workflow. GitHub only exposes the latest 14 days, so history starts when this file was introduced. The workflow updates files through the GitHub API to avoid adding its own checkout to clone traffic.",
            "daily": {date: daily[date] for date in sorted(daily)},
            "total": total,
          }, indent=2, ensure_ascii=False) + "\n"
          new_svg = make_svg(total)
          new_readme = re.sub(
            r"\./badges/downloads\.svg(?:\?v=[^ \"\)]*)?",
            f"./badges/downloads.svg?v={total}",
            readme,
          )

          files = {
            "README.md": new_readme,
            "badges/downloads.svg": new_svg,
            "badges/downloads-history.json": new_history,
          }
          current = {
            "README.md": readme,
            "badges/downloads.svg": old_svg,
            "badges/downloads-history.json": history_text,
          }
          changed = {path: text for path, text in files.items() if text != current[path]}
          if not changed:
            print("Badge has not changed")
            raise SystemExit(0)

          branch_ref = f"heads/{BRANCH}"
          ref = api("GET", f"/repos/{REPO}/git/ref/{urllib.parse.quote(branch_ref, safe='/')}", GITHUB_TOKEN)
          head_sha = ref["object"]["sha"]
          head_commit = api("GET", f"/repos/{REPO}/git/commits/{head_sha}", GITHUB_TOKEN)
          tree_entries = []
          for path, text in changed.items():
            blob = api("POST", f"/repos/{REPO}/git/blobs", GITHUB_TOKEN, {"content": text, "encoding": "utf-8"})
            tree_entries.append({"path": path, "mode": "100644", "type": "blob", "sha": blob["sha"]})
          tree = api("POST", f"/repos/{REPO}/git/trees", GITHUB_TOKEN, {"base_tree": head_commit["tree"]["sha"], "tree": tree_entries})
          commit = api("POST", f"/repos/{REPO}/git/commits", GITHUB_TOKEN, {"message": "chore: update downloads badge", "tree": tree["sha"], "parents": [head_sha]})
          api("PATCH", f"/repos/{REPO}/git/refs/{urllib.parse.quote(branch_ref, safe='/')}", GITHUB_TOKEN, {"sha": commit["sha"], "force": False})
          print(f"Updated downloads badge to {total} in commit {commit['sha']}")
          PY
